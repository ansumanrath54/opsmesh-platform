server:
  port: 8080

spring:
  application:
    name: gateway-ingress-engine

  # ZONE 1: Active Reactive Redis Cache Parameters
  data:
    redis:
      host: localhost
      port: 6379
      password: master_cache_password_secret
      timeout: 2000ms

  # ZONE 2: Active Kafka Event Log Stream Parameters
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      # Using StringSerializer since Jackson now handles string mapping directly in Java
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

  # ZONE 3: Active Reactive PostgreSQL Vector Datastore Parameters
  r2dbc:
    url: r2dbc:postgresql://localhost:5432/opsmesh_analytics_datastore
    username: root_db_user
    password: framework_master_password_2026