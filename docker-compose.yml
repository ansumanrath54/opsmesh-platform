version: '3.8'

services:
  # ---------------------------------------------------------------------------
  # ZONE 1 & 3 STATE CACHE: Idempotency & Concurrency Management Lock Store
  # ---------------------------------------------------------------------------
  opsmesh-cache-store:
    image: redis:7.2-alpine
    container_name: opsmesh_redis_cluster
    command: redis-server --appendonly yes --requirepass master_cache_password_secret
    ports:
      - "6379:6379"
    volumes:
      - redis_cluster_volume:/data
    networks:
      - opsmesh_backbone_network
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # ZONE 2 KAFKA CORE: High-Throughput Replayable Event Log (KRaft Mode)
  # ---------------------------------------------------------------------------
  opsmesh-kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: opsmesh_kafka_broker
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@opsmesh-kafka:29093
      # Clean, standard out-of-the-box KRaft listeners configuration
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:29093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    volumes:
      - kafka_broker_volume:/var/lib/kafka/data
    networks:
      - opsmesh_backbone_network
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # ZONE 3 STORAGE FABRIC: Relational State & High-Density Vector Core DB
  # ---------------------------------------------------------------------------
  opsmesh-vector-db:
    image: pgvector/pgvector:pg16
    container_name: opsmesh_postgres_cluster
    environment:
      POSTGRES_USER: root_db_user
      POSTGRES_PASSWORD: framework_master_password_2026
      POSTGRES_DB: opsmesh_analytics_datastore
    ports:
      - "5432:5432"
    volumes:
      - postgres_cluster_volume:/var/lib/postgresql/data
    networks:
      - opsmesh_backbone_network
    restart: unless-stopped

# Named persistent disk volumes mapped onto your Samsung T7 Shield SSD
volumes:
  redis_cluster_volume:
    driver: local
  kafka_broker_volume:
    driver: local
  postgres_cluster_volume:
    driver: local

# Internal network configuration allowing services to communicate safely
networks:
  opsmesh_backbone_network:
    driver: bridge